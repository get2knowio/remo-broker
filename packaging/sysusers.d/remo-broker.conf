# systemd-sysusers configuration for the remo-broker daemon.
#
# Apply with `systemd-sysusers` (run at install time by packaging, or
# manually: `sudo systemd-sysusers packaging/sysusers.d/remo-broker.conf`).
#
# Syntax: type name id gecos home shell
u remo-broker - "Remo broker daemon" /var/lib/remo-broker /usr/sbin/nologin
