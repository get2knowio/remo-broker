# systemd-tmpfiles configuration for the remo-broker daemon.
#
# The unit file declares RuntimeDirectory= and LogsDirectory= which
# means systemd creates and tears down /run/remo-broker and
# /var/log/remo-broker on unit start/stop. This file exists for the
# *ad-hoc* case: developers running the daemon directly (without
# systemd) want the same paths to exist with the same modes.
#
# Apply with `sudo systemd-tmpfiles --create packaging/tmpfiles.d/remo-broker.conf`.
#
# Type Path                       Mode  User        Group       Age   Argument
d      /run/remo-broker           0755  remo-broker remo-broker -     -
d      /var/log/remo-broker       0750  remo-broker remo-broker -     -
