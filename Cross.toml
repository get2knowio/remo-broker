# cross-rs configuration. fnox-core -> ctap-hid-fido2 -> hidapi links
# libudev at build time via pkg-config. The default cross images don't
# ship libudev-dev; install it for the cross-target debian arch
# ($CROSS_DEB_ARCH is amd64 for x86_64, arm64 for aarch64) before cargo
# runs.
#
# NOTE: the presence of *any* [target.X] section opts every target into
# cross's Docker mode (even when target == host triple), so both arches
# need the pre-build hook — not just aarch64.
[target.x86_64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libudev-dev:$CROSS_DEB_ARCH pkg-config",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libudev-dev:$CROSS_DEB_ARCH pkg-config",
]
