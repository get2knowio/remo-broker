# cross-rs configuration. fnox-core -> ctap-hid-fido2 -> hidapi links
# libudev at build time via pkg-config. The default cross images for
# aarch64-unknown-linux-gnu don't ship libudev-dev, so install it for the
# cross-target debian arch ($CROSS_DEB_ARCH = arm64 here) before cargo runs.
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libudev-dev:$CROSS_DEB_ARCH pkg-config",
]
